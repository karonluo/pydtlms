<svg baseProfile="full" height="1040px" version="1.1" viewBox="0,0,1680,1040" width="1680px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#f7fbff" height="1040" width="1680" x="0" y="0" /><text fill="#17304f" font-family="Microsoft YaHei" font-size="28" font-weight="bold" text-anchor="middle" x="840" y="42">学生门户首页原型图</text><rect fill="#fffdf8" height="900" rx="24" ry="24" stroke="#e2d8c6" stroke-width="2" width="1600" x="40" y="80" /><rect fill="#fff4de" height="86" rx="24" ry="24" stroke="none" width="1600" x="40" y="80" /><text fill="#834c11" font-family="Microsoft YaHei" font-size="30" font-weight="bold" x="90" y="133">上海人工智能实验室 博士生报名门户</text><text fill="#7a5522" font-family="Microsoft YaHei" font-size="20" x="960" y="133">首页</text><text fill="#7a5522" font-family="Microsoft YaHei" font-size="20" x="1090" y="133">招生信息</text><text fill="#7a5522" font-family="Microsoft YaHei" font-size="20" x="1220" y="133">在线申请</text><text fill="#7a5522" font-family="Microsoft YaHei" font-size="20" x="1350" y="133">账号管理</text><rect fill="#fff2d8" height="170" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="1490" x="90" y="210" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="106" y="236">博士生报名与服务门户</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="106" y="262">欢迎进入博士生报名与服务门户</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="106" y="280">首页以信息浏览、服务入口和账号操作为核心，不出现后台管理导航。</text><rect fill="#ffffff" height="110" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="300" x="100" y="430" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="116" y="456">报名入口</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="116" y="482">门户式服务卡片，适合考生点击进入下一步</text><rect fill="#ffffff" height="110" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="300" x="440" y="430" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="456" y="456">招生信息</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="456" y="482">门户式服务卡片，适合考生点击进入下一步</text><rect fill="#ffffff" height="110" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="300" x="780" y="430" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="796" y="456">账号管理</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="796" y="482">门户式服务卡片，适合考生点击进入下一步</text><rect fill="#ffffff" height="280" rx="22" ry="22" stroke="#eadfce" stroke-width="2" width="980" x="90" y="590" /><text fill="#834c11" font-family="Microsoft YaHei" font-size="24" font-weight="bold" x="120" y="635">服务入口</text><rect fill="#fff6e8" height="52" stroke="#eadfce" stroke-width="1" width="245.0" x="90.0" y="660" /><text fill="#7a5522" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="108.0" y="692">服务卡片</text><rect fill="#fff6e8" height="52" stroke="#eadfce" stroke-width="1" width="245.0" x="335.0" y="660" /><text fill="#7a5522" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="353.0" y="692">当前状态</text><rect fill="#fff6e8" height="52" stroke="#eadfce" stroke-width="1" width="245.0" x="580.0" y="660" /><text fill="#7a5522" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="598.0" y="692">说明</text><rect fill="#fff6e8" height="52" stroke="#eadfce" stroke-width="1" width="245.0" x="825.0" y="660" /><text fill="#7a5522" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="843.0" y="692">操作</text><rect fill="#ffffff" height="62" stroke="#f1e7d7" stroke-width="1" width="245.0" x="90.0" y="712" /><text fill="#71553a" font-family="Microsoft YaHei" font-size="16" x="108.0" y="750">在线申请</text><rect fill="#ffffff" height="62" stroke="#f1e7d7" stroke-width="1" width="245.0" x="335.0" y="712" /><text fill="#71553a" font-family="Microsoft YaHei" font-size="16" x="353.0" y="750">未提交</text><rect fill="#ffffff" height="62" stroke="#f1e7d7" stroke-width="1" width="245.0" x="580.0" y="712" /><text fill="#71553a" font-family="Microsoft YaHei" font-size="16" x="598.0" y="750">进入学生申报页</text><rect fill="#ffffff" height="62" stroke="#f1e7d7" stroke-width="1" width="245.0" x="825.0" y="712" /><text fill="#71553a" font-family="Microsoft YaHei" font-size="16" x="843.0" y="750">立即填写</text><rect fill="#ffffff" height="62" stroke="#f1e7d7" stroke-width="1" width="245.0" x="90.0" y="774" /><text fill="#71553a" font-family="Microsoft YaHei" font-size="16" x="108.0" y="812">账号管理</text><rect fill="#ffffff" height="62" stroke="#f1e7d7" stroke-width="1" width="245.0" x="335.0" y="774" /><text fill="#71553a" font-family="Microsoft YaHei" font-size="16" x="353.0" y="812">正常</text><rect fill="#ffffff" height="62" stroke="#f1e7d7" stroke-width="1" width="245.0" x="580.0" y="774" /><text fill="#71553a" font-family="Microsoft YaHei" font-size="16" x="598.0" y="812">修改密码与安全设置</text><rect fill="#ffffff" height="62" stroke="#f1e7d7" stroke-width="1" width="245.0" x="825.0" y="774" /><text fill="#71553a" font-family="Microsoft YaHei" font-size="16" x="843.0" y="812">立即管理</text><rect fill="#ffffff" height="62" stroke="#f1e7d7" stroke-width="1" width="245.0" x="90.0" y="836" /><text fill="#71553a" font-family="Microsoft YaHei" font-size="16" x="108.0" y="874">招生信息</text><rect fill="#ffffff" height="62" stroke="#f1e7d7" stroke-width="1" width="245.0" x="335.0" y="836" /><text fill="#71553a" font-family="Microsoft YaHei" font-size="16" x="353.0" y="874">已开放</text><rect fill="#ffffff" height="62" stroke="#f1e7d7" stroke-width="1" width="245.0" x="580.0" y="836" /><text fill="#71553a" font-family="Microsoft YaHei" font-size="16" x="598.0" y="874">查看实验室招生资讯</text><rect fill="#ffffff" height="62" stroke="#f1e7d7" stroke-width="1" width="245.0" x="825.0" y="836" /><text fill="#71553a" font-family="Microsoft YaHei" font-size="16" x="843.0" y="874">立即查看</text><rect fill="#fff9ef" height="280" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="460" x="1120" y="590" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="1136" y="616">操作说明</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="1136" y="642">学生常用操作在门户右侧区域突出展示，避免进入复杂后台结构。</text><rect fill="#ffffff" height="48" rx="12" ry="12" stroke="#eadfce" stroke-width="1" width="390" x="1150" y="670" /><text fill="#71553a" font-family="Microsoft YaHei" font-size="16" x="1170" y="701">从顶部导航进入服务</text><rect fill="#ffffff" height="48" rx="12" ry="12" stroke="#eadfce" stroke-width="1" width="390" x="1150" y="728" /><text fill="#71553a" font-family="Microsoft YaHei" font-size="16" x="1170" y="759">查看招生公告与日程</text><rect fill="#ffffff" height="48" rx="12" ry="12" stroke="#eadfce" stroke-width="1" width="390" x="1150" y="786" /><text fill="#71553a" font-family="Microsoft YaHei" font-size="16" x="1170" y="817">进入在线申请或账号管理</text><rect fill="#ffffff" height="48" rx="12" ry="12" stroke="#eadfce" stroke-width="1" width="390" x="1150" y="844" /><text fill="#71553a" font-family="Microsoft YaHei" font-size="16" x="1170" y="875">返回首页继续浏览信息</text></svg>