<svg baseProfile="full" height="1020px" version="1.1" viewBox="0,0,1800,1020" width="1800px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#fbfdff" height="1020" width="1800" x="0" y="0" /><text fill="#17304f" font-family="Microsoft YaHei" font-size="30" font-weight="bold" text-anchor="middle" x="900" y="50">博士生生命周期管理系统模块功能图</text><rect fill="#eef6ff" height="160" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="400" x="700" y="410" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="716" y="436">系统核心</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="716" y="462">统一认证</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="716" y="480">统一流程</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="716" y="498">统一日志</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="716" y="516">统一配置</text><rect fill="#fff7e8" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="320" x="180" y="160" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="196" y="186">经营总览</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="196" y="212">KPI、预警、阶段总览</text><rect fill="#eefcf2" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="320" x="700" y="140" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="716" y="166">招生管理</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="716" y="192">计划、申请、评分、面试、录取</text><rect fill="#fff7e8" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="320" x="1220" y="160" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="1236" y="186">学生与中心</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="1236" y="212">主档、注册