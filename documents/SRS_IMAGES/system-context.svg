<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="980px" version="1.1" viewBox="0,0,1800,980" width="1800px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#fbfdff" height="980" width="1800" x="0" y="0" /><text fill="#17304f" font-family="Microsoft YaHei" font-size="30" font-weight="bold" text-anchor="middle" x="900" y="50">博士生生命周期管理系统上下文图</text><rect fill="#eef6ff" height="110" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="260" x="120" y="150" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="136" y="176">管理端用户</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="136" y="202">管理员、导师、学位秘书、评分人、面试官</text><rect fill="#fff7e8" height="110" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="260" x="1420" y="150" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="1436" y="176">门户考生/学生</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="1436" y="202">注册、登录、找回密码、在线申请</text><rect fill="#eefcf2" height="170" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="640" x="580" y="180" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="596" y="206">博士生生命周期管理系统</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="596" y="232">前端：Vue3 + Element Plus</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="596" y="250">后端：FastAPI</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="596" y="268">支持统一托管与前后端分离部署</text><line stroke="#40649a" stroke-width="3" x1="380" x2="580" y1="205" y2="205" /><polygon fill="#40649a" points="580,205 566,197 566,213" /><text fill="#40649a" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="480.0" y="195.0">管理端访问</text><line stroke="#40649a" stroke-width="3" x1="1420" x2="1220" y1="205" y2="205" /><polygon fill="#40649a" points="1220,205 1234,197 1234,213" /><text fill="#40649a" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="1320.0" y="195.0">门户访问</text><rect fill="#f4f0ff" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="260" x="220" y="450" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="236" y="476">PostgreSQL</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="236" y="502">业务主数据</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="236" y="520">流程兼容数据</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="236" y="538">治理数据</text><rect fill="#fff5e8" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="260" x="560" y="450" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="576" y="476">Redis</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="576" y="502">会话</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="576" y="520">验证码</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="576" y="538">缓存</text><rect fill="#fff4ea" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="260" x="900" y="450" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="916" y="476">邮件服务</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="916" y="502">注册验证码</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="916" y="520">通知消息</text><rect fill="#eef6ff" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="260" x="1240" y="450" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="1256" y="476">Web 服务器/Nginx</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="1256" y="502">静态资源</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="1256" y="520">HTTPS</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="1256" y="538">反向代理</text><line stroke="#40649a" stroke-width="3" x1="900" x2="350" y1="350" y2="450" /><polygon fill="#40649a" points="350,450 364,442 364,458" /><text fill="#40649a" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="625.0" y="390.0">数据持久化</text><line stroke="#40649a" stroke-width="3" x1="900" x2="690" y1="350" y2="450" /><polygon fill="#40649a" points="690,450 704,442 704,458" /><text fill="#40649a" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="795.0" y="390.0">缓存/会话</text><line stroke="#40649a" stroke-width="3" x1="900" x2="1030" y1="350" y2="450" /><polygon fill="#40649a" points="1030,450 1016,442 1016,458" /><text fill="#40649a" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="965.0" y="390.0">邮件通知</text><line stroke="#40649a" stroke-width="3" x1="900" x2="1370" y1="350" y2="450" /><polygon fill="#40649a" points="1370,450 1356,442 1356,458" /><text fill="#40649a" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="1135.0" y="390.0">静态资源/代理</text><rect fill="#ffffff" height="140" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="760" x="520" y="700" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="536" y="726">边界说明</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="536" y="752">系统对外主要暴露 Web 页面与 JSON API；对内依赖 PostgreSQL、Redis 和邮件服务。管理端与门户使用双认证域，统一审批与审计能力横向贯穿全部业务模块。</text></svg>