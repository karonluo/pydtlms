<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="860px" version="1.1" viewBox="0,0,1860,860" width="1860px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#fbfdff" height="860" width="1860" x="0" y="0" /><text fill="#17304f" font-family="Microsoft YaHei" font-size="30" font-weight="bold" text-anchor="middle" x="930" y="48">门户在线申请流程图</text><rect fill="#eef6ff" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="200" x="40" y="250" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="56" y="276">认证登录</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="56" y="302">注册/登录/找回密码</text><line stroke="#40649a" stroke-width="3" x1="240" x2="270" y1="310" y2="310" /><polygon fill="#40649a" points="270,310 256,302 256,318" /><rect fill="#fff7e8" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="200" x="270" y="250" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="286" y="276">进入首页</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="286" y="302">查看进度与入口</text><line stroke="#40649a" stroke-width="3" x1="470" x2="500" y1="310" y2="310" /><polygon fill="#40649a" points="500,310 486,302 486,318" /><rect fill="#eef6ff" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="200" x="500" y="250" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="516" y="276">填写基本信息</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="516" y="302">身份、联系方式、照片</text><line stroke="#40649a" stroke-width="3" x1="700" x2="730" y1="310" y2="310" /><polygon fill="#40649a" points="730,310 716,302 716,318" /><rect fill="#fff7e8" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="200" x="730" y="250" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="746" y="276">填写报名信息</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="746" y="302">志愿、导师、渠道</text><line stroke="#40649a" stroke-width="3" x1="930" x2="960" y1="310" y2="310" /><polygon fill="#40649a" points="960,310 946,302 946,318" /><rect fill="#eef6ff" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="200" x="960" y="250" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="976" y="276">完善经历资料</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="976" y="302">教育、实践、英语、家庭、成果</text><line stroke="#40649a" stroke-width="3" x1="1160" x2="1190" y1="310" y2="310" /><polygon fill="#40649a" points="1190,310 1176,302 1176,318" /><rect fill="#fff7e8" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="200" x="1190" y="250" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="1206" y="276">个人陈述</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="1206" y="302">AI 思考、简历上传</text><line stroke="#40649a" stroke-width="3" x1="1390" x2="1420" y1="310" y2="310" /><polygon fill="#40649a" points="1420,310 1406,302 1406,318" /><rect fill="#eef6ff" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="200" x="1420" y="250" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="1436" y="276">保存草稿</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="1436" y="302">可反复返回修改</text><line stroke="#40649a" stroke-width="3" x1="1620" x2="1650" y1="310" y2="310" /><polygon fill="#40649a" points="1650,310 1636,302 1636,318" /><rect fill="#fff7e8" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="200" x="1650" y="250" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="1666" y="276">最终提交</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="1666" y="302">勾选声明并提交招生申请</text><rect fill="#eefcf2" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="520" x="220" y="520" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="236" y="546">附件管理</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="236" y="572">在教育经历、英语能力和个人陈述等章节上传成绩单、证书和简历，系统按分类校验格式、大小与内容类型。</text><rect fill="#f4f0ff" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="420" x="820" y="520" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="836" y="546">状态指示</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="836" y="572">左侧章节导航显示未开始、进行中和已完成状态，支持用户快速定位未完成项。</text><rect fill="#fff4ea" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="360" x="1320" y="520" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="1336" y="546">结果输出</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="1336" y="572">提交后生成招生申请记录、业务键和后续招生评审入口。</text></svg>