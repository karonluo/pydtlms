<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="1040px" version="1.1" viewBox="0,0,1680,1040" width="1680px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#f7fbff" height="1040" width="1680" x="0" y="0" /><text fill="#17304f" font-family="Microsoft YaHei" font-size="28" font-weight="bold" text-anchor="middle" x="840" y="42">门户认证原型图</text><rect fill="#ffffff" height="900" rx="24" ry="24" stroke="#cfdae8" stroke-width="2" width="1600" x="40" y="80" /><rect fill="#103250" height="900" rx="24" ry="24" stroke="none" width="760" x="40" y="80" /><rect fill="#fdfefe" height="900" rx="24" ry="24" stroke="none" width="940" x="700" y="80" /><text fill="#ffffff" font-family="Microsoft YaHei" font-size="36" font-weight="bold" x="120" y="170">上海人工智能实验室</text><text fill="#dfeeff" font-family="Microsoft YaHei" font-size="30" x="120" y="225">博士生报名与服务门户</text><rect fill="#174467" height="130" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="600" x="110" y="300" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="126" y="326">统一认证入口</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="126" y="352">登录、注册、找回密码均在同一页面切换完成</text><rect fill="#1b4c74" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="600" x="110" y="470" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="126" y="496">招生提示</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="126" y="522">首页可查看招生信息、报名日程与申请开放状态</text><rect fill="#205684" height="140" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="600" x="110" y="630" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="126" y="656">操作路径</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="126" y="682">选择认证模式</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="126" y="700">填写账号资料</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="126" y="718">完成图形与邮箱验证码</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="126" y="736">进入门户首页</text><rect fill="#ffffff" height="660" rx="24" ry="24" stroke="#d6dfeb" stroke-width="2" width="540" x="900" y="190" /><text fill="#17304f" font-family="Microsoft YaHei" font-size="32" font-weight="bold" x="960" y="260">门户认证中心</text><rect fill="#f6f8fb" height="42" rx="14" ry="14" stroke="#d6dfeb" stroke-width="1" width="120" x="960" y="300" /><text fill="#17304f" font-family="Microsoft YaHei" font-size="18" x="992" y="328">登录</text><rect fill="#eef6ff" height="42" rx="14" ry="14" stroke="#d6dfeb" stroke-width="1" width="120" x="1100" y="300" /><text fill="#17304f" font-family="Microsoft YaHei" font-size="18" x="1132" y="328">注册</text><rect fill="#f6f8fb" height="42" rx="14" ry="14" stroke="#d6dfeb" stroke-width="1" width="120" x="1240" y="300" /><text fill="#17304f" font-family="Microsoft YaHei" font-size="18" x="1272" y="328">找回密码</text><rect fill="#f8fafc" height="54" rx="12" ry="12" stroke="#d6dfeb" stroke-width="1" width="420" x="960" y="390" /><text fill="#7a8798" font-family="Microsoft YaHei" font-size="18" x="985" y="424">手机号</text><rect fill="#f8fafc" height="54" rx="12" ry="12" stroke="#d6dfeb" stroke-width="1" width="420" x="960" y="464" /><text fill="#7a8798" font-family="Microsoft YaHei" font-size="18" x="985" y="498">邮箱地址</text><rect fill="#f8fafc" height="54" rx="12" ry="12" stroke="#d6dfeb" stroke-width="1" width="420" x="960" y="538" /><text fill="#7a8798" font-family="Microsoft YaHei" font-size="18" x="985" y="572">姓名</text><rect fill="#f8fafc" height="54" rx="12" ry="12" stroke="#d6dfeb" stroke-width="1" width="420" x="960" y="612" /><text fill="#7a8798" font-family="Microsoft YaHei" font-size="18" x="985" y="646">图形验证码</text><rect fill="#f8fafc" height="54" rx="12" ry="12" stroke="#d6dfeb" stroke-width="1" width="420" x="960" y="686" /><text fill="#7a8798" font-family="Microsoft YaHei" font-size="18" x="985" y="720">邮箱验证码</text><rect fill="#f8fafc" height="54" rx="12" ry="12" stroke="#d6dfeb" stroke-width="1" width="420" x="960" y="760" /><text fill="#7a8798" font-family="Microsoft YaHei" font-size="18" x="985" y="794">密码设置</text><rect fill="#e8f1fb" height="54" rx="12" ry="12" stroke="#bfd4ea" stroke-width="1" width="90" x="1290" y="612" /><text fill="#295d8b" font-family="Microsoft YaHei" font-size="18" x="1318" y="646">发送</text><rect fill="#17304f" height="60" rx="16" ry="16" stroke="none" width="420" x="960" y="720" /><text fill="#ffffff" font-family="Microsoft YaHei" font-size="22" font-weight="bold" x="1078" y="758">提交并进入门户首页</text><rect fill="#f7f3ff" height="110" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="540" x="900" y="820" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="916" y="846">操作说明</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="916" y="872">重点关注：双验证码、冷却时间、错误反馈和成功跳转</text></svg>