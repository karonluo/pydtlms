<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="920px" version="1.1" viewBox="0,0,1780,920" width="1780px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#fbfdff" height="920" width="1780" x="0" y="0" /><text fill="#17304f" font-family="Microsoft YaHei" font-size="30" font-weight="bold" text-anchor="middle" x="890" y="48">部署拓扑图</text><rect fill="#eef6ff" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="300" x="110" y="160" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="126" y="186">浏览器</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="126" y="212">管理端和学生门户</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="126" y="230">静态资源与 API 调用入口</text><rect fill="#fff7e8" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="300" x="530" y="160" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="546" y="186">Nginx / Web 服务器</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="546" y="212">HTTPS</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="546" y="230">静态资源缓存</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="546" y="248">反向代理</text><rect fill="#eefcf2" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="300" x="950" y="160" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="966" y="186">FastAPI 应用</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="966" y="212">统一托管或 API 服务</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="966" y="230">业务处理</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="966" y="248">认证与流程</text><rect fill="#fff4ea" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="300" x="1370" y="160" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="1386" y="186">后台任务/通知</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="1386" y="212">邮件发送</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="1386" y="230">异步处理</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="1386" y="248">扩展接口</text><line stroke="#40649a" stroke-width="3" x1="410" x2="530" y1="220" y2="220" /><polygon fill="#40649a" points="530,220 516,212 516,228" /><text fill="#40649a" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="470.0" y="210.0">HTTPS</text><line stroke="#40649a" stroke-width="3" x1="830" x2="950" y1="220" y2="220" /><polygon fill="#40649a" points="950,220 936,212 936,228" /><text fill="#40649a" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="890.0" y="210.0">API/静态</text><line stroke="#40649a" stroke-width="3" x1="1250" x2="1370" y1="220" y2="220" /><polygon fill="#40649a" points="1370,220 1356,212 1356,228" /><text fill="#40649a" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="1310.0" y="210.0">通知/异步</text><rect fill="#f4f0ff" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="280" x="370" y="470" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="386" y="496">PostgreSQL</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="386" y="522">主数据</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="386" y="540">业务数据</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="386" y="558">日志与流程兼容数据</text><rect fill="#fff5e8" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="280" x="760" y="470" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="776" y="496">Redis</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="776" y="522">会话</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="776" y="540">验证码</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="776" y="558">缓存</text><rect fill="#eef6ff" height="120" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="280" x="1150" y="470" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="1166" y="496">SMTP/邮件网关</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="1166" y="522">验证码与通知消息</text><line stroke="#40649a" stroke-width="3" x1="1080" x2="510" y1="280" y2="470" /><polygon fill="#40649a" points="510,470 524,462 524,478" /><text fill="#40649a" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="795.0" y="365.0">SQL</text><line stroke="#40649a" stroke-width="3" x1="1080" x2="900" y1="280" y2="470" /><polygon fill="#40649a" points="900,470 914,462 914,478" /><text fill="#40649a" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="990.0" y="365.0">Redis 协议</text><line stroke="#40649a" stroke-width="3" x1="1370" x2="1290" y1="280" y2="470" /><polygon fill="#40649a" points="1290,470 1304,462 1304,478" /><text fill="#40649a" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="1330.0" y="365.0">SMTP</text><rect fill="#ffffff" height="110" rx="18" ry="18" stroke="#183a75" stroke-width="2" width="1280" x="250" y="700" /><text fill="#12284d" font-family="Microsoft YaHei" font-size="18" font-weight="bold" x="266" y="726">部署说明</text><text fill="#4d6287" font-family="Microsoft YaHei" font-size="13" x="266" y="752">统一托管模式下 FastAPI 同时提供 API 与已构建前端资源；前后端分离模式下 Nginx 提供前端静态资源，FastAPI 仅提供 /api 和健康检查接口。</text></svg>